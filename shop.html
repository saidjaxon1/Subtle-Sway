<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Subtle Sway</title>
  <meta name="description" content="Every piece in the Subtle Sway edit — home objects, digital guides and apparel.">

  <!-- Fonts: Fraunces (display) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./style.css?v=10">
  <script src="./main.js?v=10" defer></script>
</head>
<body data-page="shop">

  <header class="site-header">
    <div class="wrap">
      <a class="site-name" href="./index.html">Subtle Sway</a>
      <nav class="site-nav" aria-label="Main">
        <a href="./index.html">Home</a>
        <a href="./shop.html" aria-current="page">Shop</a>
        <a href="./blog.html">Journal</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <span class="eyebrow">The Shop</span>
    <h1 class="page-title">Every piece, in one place.</h1>

    <!-- Search + category filters — built from products.json by main.js -->
    <div class="filter-bar" aria-label="Search and filter">
      <div class="search-row">
        <input type="search" id="product-search" placeholder="Search the shop…" aria-label="Search products" autocomplete="off">
      </div>
      <div class="filter-row" id="category-row"></div>
      <div class="filter-row sub" id="subcategory-row" hidden></div>
    </div>

    <!-- Product grid — populated from products.json by main.js -->
    <section aria-label="Products">
      <ul class="product-grid" id="product-grid"></ul>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>&copy; 2026 Subtle Sway. All rights reserved.</p>
      <p>As an affiliate, we may earn from qualifying purchases.</p>
      <div class="footer-contact" id="footer-contact" hidden></div>
    </div>
  </footer>

</body>
</html>
